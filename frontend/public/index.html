<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flutter Jobs — Suisse romande</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #0F6E56;
    --teal-light: #e1f5ee;
    --teal-mid: #1D9E75;
    --teal-border: #5DCAA5;
    --text: #1a1a2e;
    --text-muted: #666;
    --text-faint: #999;
    --bg: #ffffff;
    --bg-surface: #f7f8fa;
    --bg-hover: #f0f0f0;
    --border: #e5e5e5;
    --border-strong: #ccc;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-surface); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: var(--teal); color: white; padding: 1.5rem 2rem; }
  .header-inner { max-width: 960px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
  .header h1 { font-size: 1.4rem; font-weight: 600; }
  .header h1 span { opacity: 0.75; font-weight: 400; font-size: 1rem; margin-left: 8px; }
  .last-update { font-size: 12px; opacity: 0.7; }

  /* Stats */
  .stats-bar { background: white; border-bottom: 1px solid var(--border); padding: 1rem 2rem; }
  .stats-inner { max-width: 960px; margin: 0 auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
  .stat { text-align: center; }
  .stat-value { font-size: 1.6rem; font-weight: 600; color: var(--teal); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* Main layout */
  .main { max-width: 960px; margin: 0 auto; padding: 1.5rem 2rem; display: grid; grid-template-columns: 240px 1fr; gap: 1.5rem; align-items: start; }
  @media (max-width: 700px) { .main { grid-template-columns: 1fr; } .stats-inner { grid-template-columns: repeat(2,1fr); } }

  /* Sidebar filtres */
  .sidebar { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; position: sticky; top: 1rem; }
  .sidebar h2 { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); margin-bottom: 1rem; }
  .filter-group { margin-bottom: 1.25rem; }
  .filter-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 6px; }
  .filter-group select, .filter-group input { width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: white; color: var(--text); }
  .source-toggles { display: flex; flex-direction: column; gap: 6px; }
  .source-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 4px 0; }
  .source-toggle input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--teal); cursor: pointer; }
  .source-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .btn-reset { width: 100%; padding: 8px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: white; cursor: pointer; color: var(--text-muted); }
  .btn-reset:hover { background: var(--bg-hover); }
  .btn-scrape { width: 100%; padding: 8px; font-size: 13px; border: none; border-radius: var(--radius-sm); background: var(--teal); color: white; cursor: pointer; font-weight: 500; margin-top: 8px; }
  .btn-scrape:hover { background: #085041; }
  .btn-scrape:disabled { opacity: 0.6; cursor: not-allowed; }

  /* Jobs list */
  .jobs-section {}
  .jobs-toolbar { display: flex; gap: 10px; margin-bottom: 1rem; align-items: center; }
  .search-input { flex: 1; padding: 9px 14px; font-size: 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: white; color: var(--text); }
  .search-input:focus { outline: none; border-color: var(--teal-border); }
  .results-count { font-size: 13px; color: var(--text-muted); white-space: nowrap; }

  /* Job card */
  .jobs-list { display: flex; flex-direction: column; gap: 10px; }
  .job-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.1rem 1.25rem; cursor: pointer; transition: border-color .15s, box-shadow .15s; text-decoration: none; color: inherit; display: block; }
  .job-card:hover { border-color: var(--teal-border); box-shadow: 0 2px 8px rgba(15,110,86,.08); }
  .job-card.is-new { border-left: 3px solid var(--teal-mid); }
  .card-top { display: flex; justify-content: space-between; gap: 1rem; margin-bottom: 6px; }
  .job-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
  .job-company { font-size: 13px; font-weight: 500; color: var(--teal); margin-top: 2px; }
  .card-right { text-align: right; flex-shrink: 0; }
  .salary-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; background: #FAEEDA; color: #633806; border-radius: 4px; margin-bottom: 4px; }
  .card-date { font-size: 11px; color: var(--text-faint); }
  .card-meta { display: flex; gap: 14px; font-size: 12px; color: var(--text-muted); margin: 8px 0; flex-wrap: wrap; }
  .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; }
  .tag.flutter { background: var(--teal-light); color: #085041; }
  .tag.tech { background: #EEEDFE; color: #3C3489; }
  .tag.new { background: #EAF3DE; color: #27500A; }
  .tag.source { margin-left: auto; background: var(--bg-surface); color: var(--text-muted); border: 1px solid var(--border); }

  /* Pagination */
  .pagination { display: flex; gap: 6px; justify-content: center; margin-top: 1.5rem; flex-wrap: wrap; }
  .page-btn { padding: 6px 12px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); background: white; cursor: pointer; color: var(--text-muted); }
  .page-btn:hover { background: var(--bg-hover); }
  .page-btn.active { background: var(--teal); color: white; border-color: var(--teal); }

  /* States */
  .loading { text-align: center; padding: 4rem; color: var(--text-muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--teal); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 4rem; color: var(--text-muted); font-size: 14px; }
  .error-banner { background: #FCEBEB; border: 1px solid #F7C1C1; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #A32D2D; margin-bottom: 1rem; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>Flutter Jobs <span>Suisse romande</span></h1>
    <div class="last-update">Mis à jour : <span id="last-update-time">—</span></div>
  </div>
</div>

<div class="stats-bar">
  <div class="stats-inner">
    <div class="stat"><div class="stat-value" id="stat-total">—</div><div class="stat-label">Offres actives</div></div>
    <div class="stat"><div class="stat-value" id="stat-new">—</div><div class="stat-label">Nouvelles (48h)</div></div>
    <div class="stat"><div class="stat-value" id="stat-remote">—</div><div class="stat-label">Remote / hybride</div></div>
    <div class="stat"><div class="stat-value" id="stat-sources">—</div><div class="stat-label">Sources actives</div></div>
  </div>
</div>

<div class="main">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2>Filtres</h2>

    <div class="filter-group">
      <label>Ville</label>
      <select id="f-city" onchange="applyFilters()">
        <option value="">Toutes</option>
        <option value="Genève">Genève</option>
        <option value="Lausanne">Lausanne</option>
        <option value="Neuchâtel">Neuchâtel</option>
        <option value="Fribourg">Fribourg</option>
        <option value="Berne">Berne</option>
        <option value="Remote">Remote</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Contrat</label>
      <select id="f-contract" onchange="applyFilters()">
        <option value="">Tous</option>
        <option value="CDI">CDI</option>
        <option value="CDD">CDD</option>
        <option value="Freelance">Freelance</option>
        <option value="Stage">Stage</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Télétravail</label>
      <select id="f-remote" onchange="applyFilters()">
        <option value="">Tous</option>
        <option value="Full Remote">Full Remote</option>
        <option value="Hybride">Hybride</option>
        <option value="Sur site">Sur site</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Sources</label>
      <div class="source-toggles" id="source-toggles"></div>
    </div>

    <button class="btn-reset" onclick="resetFilters()">Réinitialiser les filtres</button>
    <button class="btn-scrape" id="btn-scrape" onclick="triggerScrape()">↻ Actualiser les offres</button>
  </aside>

  <!-- Jobs -->
  <section class="jobs-section">
    <div class="jobs-toolbar">
      <input type="text" class="search-input" id="search-input" placeholder="Rechercher (titre, entreprise, techno...)" oninput="debounceSearch()" />
      <span class="results-count" id="results-count"></span>
    </div>
    <div id="error-container"></div>
    <div class="jobs-list" id="jobs-list">
      <div class="loading"><div class="spinner"></div><br><br>Chargement des offres…</div>
    </div>
    <div class="pagination" id="pagination"></div>
  </section>

</div>

<script>
const API = '/api';
let currentPage = 1;
let totalPages = 1;
let searchTimeout = null;

const SOURCES = [
  { id: 'jobup',     label: 'Jobup.ch',     color: '#1D9E75' },
  { id: 'jobs_ch',   label: 'Jobs.ch',      color: '#185FA5' },
  { id: 'swissdev',  label: 'SwissDevJobs', color: '#534AB7' },
  { id: 'indeed',    label: 'Indeed CH',    color: '#3B6D11' },
  { id: 'emploi_it', label: 'Emploi-IT',    color: '#BA7517' },
];

const activeSources = new Set(SOURCES.map(s => s.id));

function initSourceToggles() {
  const container = document.getElementById('source-toggles');
  container.innerHTML = SOURCES.map(s => `
    <label class="source-toggle">
      <input type="checkbox" checked onchange="toggleSource('${s.id}')" />
      <span class="source-dot" style="background:${s.color}"></span>
      ${s.label}
    </label>
  `).join('');
}

function toggleSource(id) {
  if (activeSources.has(id)) activeSources.delete(id);
  else activeSources.add(id);
  currentPage = 1;
  loadJobs();
}

async function loadStats() {
  try {
    const res = await fetch(`${API}/stats`);
    const data = await res.json();
    document.getElementById('stat-total').textContent = data.total ?? '—';
    document.getElementById('stat-new').textContent = data.newLast48h ?? '—';
    document.getElementById('stat-remote').textContent = data.remote ?? '—';
    document.getElementById('stat-sources').textContent = Object.keys(data.bySource || {}).length || '—';
    if (data.lastScraped) {
      document.getElementById('last-update-time').textContent =
        new Date(data.lastScraped).toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
    }
  } catch (e) {
    console.error('Stats error:', e);
  }
}

async function loadJobs() {
  const q = document.getElementById('search-input').value.trim();
  const city = document.getElementById('f-city').value;
  const contract = document.getElementById('f-contract').value;
  const remote = document.getElementById('f-remote').value;

  const params = new URLSearchParams({ page: currentPage, limit: 15 });
  if (q) params.set('q', q);
  if (city) params.set('city', city);
  if (contract) params.set('contract', contract);
  if (remote) params.set('remote', remote);
  if (activeSources.size < SOURCES.length && activeSources.size > 0) {
    params.set('source', [...activeSources].join(','));
  }

  document.getElementById('jobs-list').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('error-container').innerHTML = '';

  try {
    const res = await fetch(`${API}/jobs?${params}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    totalPages = data.totalPages || 1;
    document.getElementById('results-count').textContent = `${data.total} offre${data.total > 1 ? 's' : ''}`;

    renderJobs(data.jobs || []);
    renderPagination();
  } catch (err) {
    document.getElementById('error-container').innerHTML =
      `<div class="error-banner">Erreur de chargement: ${err.message}. Vérifie que le serveur est démarré.</div>`;
    document.getElementById('jobs-list').innerHTML = '<div class="empty">Impossible de charger les offres.</div>';
  }
}

function renderJobs(jobs) {
  if (jobs.length === 0) {
    document.getElementById('jobs-list').innerHTML = '<div class="empty">Aucune offre trouvée avec ces filtres.</div>';
    return;
  }

  const srcMap = {};
  SOURCES.forEach(s => srcMap[s.id] = s);

  const now = Date.now();
  document.getElementById('jobs-list').innerHTML = jobs.map(j => {
    const src = srcMap[j.source] || { label: j.source, color: '#888' };
    const isNew = (now - new Date(j.scraped_at).getTime()) < 48 * 3600 * 1000;
    const daysDiff = Math.floor((now - new Date(j.scraped_at).getTime()) / 86400000);
    const dateStr = daysDiff === 0 ? "Aujourd'hui" : daysDiff === 1 ? "Hier" : `Il y a ${daysDiff}j`;
    const tags = Array.isArray(j.tags) ? j.tags : [];

    return `
      <a class="job-card${isNew ? ' is-new' : ''}" href="${j.url}" target="_blank" rel="noopener">
        <div class="card-top">
          <div>
            <div class="job-title">${escHtml(j.title)}</div>
            <div class="job-company">${escHtml(j.company || '')}</div>
          </div>
          <div class="card-right">
            ${j.salary ? `<div class="salary-badge">${escHtml(j.salary)}</div><br>` : ''}
            <div class="card-date">${dateStr}</div>
          </div>
        </div>
        <div class="card-meta">
          <span>📍 ${escHtml(j.city || 'Suisse')}</span>
          <span>📋 ${escHtml(j.contract || 'CDI')}</span>
          <span>🏠 ${escHtml(j.remote || 'Sur site')}</span>
        </div>
        ${j.description ? `<div class="card-desc">${escHtml(j.description)}</div>` : ''}
        <div class="card-tags">
          ${tags.map(t => `<span class="tag ${t === 'Flutter' || t === 'Dart' ? 'flutter' : 'tech'}">${escHtml(t)}</span>`).join('')}
          ${isNew ? '<span class="tag new">Nouveau</span>' : ''}
          <span class="tag source" style="border-color:${src.color};color:${src.color}">${src.label}</span>
        </div>
      </a>
    `;
  }).join('');
}

function renderPagination() {
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  const start = Math.max(1, currentPage - 2);
  const end = Math.min(totalPages, currentPage + 2);
  if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>`;
  if (start > 2) html += `<span style="padding:6px 4px;color:#999">…</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (end < totalPages - 1) html += `<span style="padding:6px 4px;color:#999">…</span>`;
  if (end < totalPages) html += `<button class="page-btn" onclick="goPage(${totalPages})">${totalPages}</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { currentPage = p; loadJobs(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

function applyFilters() { currentPage = 1; loadJobs(); }

function debounceSearch() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => { currentPage = 1; loadJobs(); }, 350);
}

function resetFilters() {
  document.getElementById('f-city').value = '';
  document.getElementById('f-contract').value = '';
  document.getElementById('f-remote').value = '';
  document.getElementById('search-input').value = '';
  activeSources.clear();
  SOURCES.forEach(s => activeSources.add(s.id));
  document.querySelectorAll('#source-toggles input').forEach(cb => cb.checked = true);
  currentPage = 1;
  loadJobs();
}

async function triggerScrape() {
  const secret = prompt('Clé secrète (SCRAPE_SECRET dans .env) :');
  if (!secret) return;
  const btn = document.getElementById('btn-scrape');
  btn.disabled = true;
  btn.textContent = 'Scraping en cours…';
  try {
    const res = await fetch(`${API}/scrape`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-scrape-secret': secret },
      body: JSON.stringify({ secret }),
    });
    const data = await res.json();
    if (res.ok) {
      alert('Scraping lancé ! Les offres seront mises à jour dans 2-3 minutes.');
      setTimeout(() => { loadStats(); loadJobs(); }, 180000);
    } else {
      alert('Erreur : ' + (data.error || 'Non autorisé'));
    }
  } catch (e) {
    alert('Erreur réseau');
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Actualiser les offres';
  }
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

initSourceToggles();
loadStats();
loadJobs();
</script>
</body>
</html>
